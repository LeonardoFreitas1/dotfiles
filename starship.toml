add_newline = false

format = """
в•ӯ[оӮ¶](#769ff0)$time[ | ](bg:#769ff0)$username[$git_branch](bg:#769ff0 fg:black) $c $nodejs $rust $java
в•°в”Җв”Җ$character"""
right_format = "$cmd_duration"

[character]
