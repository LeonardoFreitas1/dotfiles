error_symbol = "[1](bold red)"

[directory.substitutions]
"~" = "Home"

[c]
symbol = "оҳһ"
style = "bg:#769ff0"
format = "[[оӮ¶](#769ff0)[$symbol](bg:#769ff0 fg:white)[оӮҙ](fg:#769ff0 bg:white)$version](fg:black bg:white)[оӮҙ](white)"

[username]
disabled = false
style_root = "bg:#769ff0"
style_user = "bg:#769ff0"
format = "[$user]($style)[оӮҙ](fg:#769ff0 bg:#394260)"
show_always = true

[hostname]
disabled = false
format = "$hostname"
ssh_only = false

[cmd_duration]
disabled = false
format = "[оӮ¶](white)[took $duration](bg:white fg:black)[оӮҙ](white)"

[time]
disabled = false
use_12hr = true
style = "bg:#769ff0"
format = "[$time]($style)"

[localip]
